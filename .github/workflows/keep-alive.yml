name: Supabase Keep Alive

on:
  schedule:
    # Tous les lundis à 8h00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Permet aussi de lancer manuellement depuis GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase pour maintenir le projet actif
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qgrrfthtdzjyxovodieg.supabase.co/rest/v1/observations?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Statut HTTP : $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Supabase actif et répondant"
          else
            echo "⚠️ Supabase a répondu avec le code $STATUS"
            exit 1
          fi
